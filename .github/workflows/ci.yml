name: CI

on: [push, pull_request]

jobs:
  # ── job 1: build & unit tests ────────────────────────────────────────────────
  test:
    name: Build & unit tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/install-deps

      - name: Cache raylib build
        id: cache-raylib
        uses: actions/cache@v4
        with:
          path: /tmp/raylib-install
          key: raylib-5.0-ubuntu-22.04

      - name: Build & install raylib
        if: steps.cache-raylib.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 5.0 https://github.com/raysan5/raylib.git /tmp/raylib_src
          cmake -S /tmp/raylib_src -B /tmp/raylib_src/build \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_INSTALL_PREFIX=/tmp/raylib-install
          cmake --build /tmp/raylib_src/build -j$(nproc)
          cmake --install /tmp/raylib_src/build

      - name: Install Doxygen
        run: sudo apt-get install -y --no-install-recommends doxygen

      - name: Configure & build
        run: |
          cmake -B build -DCMAKE_PREFIX_PATH=/tmp/raylib-install
          cmake --build build -j$(nproc)

      - name: Build docs
        run: cmake --build build --target docs

      - name: Test
        run: xvfb-run --auto-servernum ctest --test-dir build --output-on-failure

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smeagol-build
          path: build/
          retention-days: 1
