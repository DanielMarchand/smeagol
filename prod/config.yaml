# To run:
#   ./build/evolve prod/config.yaml
#
# Output lands in:  <output_base_dir>/run_<timestamp>/
# To resume a run:  set run_dir to the leaf name (e.g. run_20260306_000952)
#                   and set resume: true  — full path = output_base_dir/run_dir
#
# ─────────────────────────────────────────────────────────────────────────────

population_size:  200
max_evaluations:  100000
seed:             0          # 0 = seed from std::random_device (different each run)
output_base_dir:  runs/ # timestamped run dirs are created here
#run_dir:          run_20260306_000952  # leaf name only — full path = output_base_dir/run_dir
record_min_improvement: 0.01 # 0.01  # new record must beat old by at least this many metres
resume:           false         # set run_dir above and resume: true to continue a run

report_interval: 50
periodic_video_interval: 1000

# ── Selection ─────────────────────────────────────────────────────────────────
#
# HOW PARENT SELECTION WORKS
# Each generation: pick a parent, clone+mutate it, evaluate the child, write it
# back into the population. `scheme` + `pressure` together control how the
# parent is chosen. There are three options:
#
#   scheme: proportionate   Each robot's probability of being chosen is
#                           proportional to fitness^pressure.
#                           pressure=1.0  →  linear roulette (original L&P)
#                           pressure=2.0  →  quadratic (wider gaps between good
#                                            and bad robots)
#                           Weakness: if all fitness values are clustered (e.g.
#                           0.10–0.12 m) pressure has almost no effect.
#
#   scheme: tournament      Randomly grab `pressure` robots, the fittest one
#                           wins and becomes the parent. Scale-independent.
#                           pressure=2   →  coin flip between two random robots
#                           pressure=5   →  best of 5  (winner ≈ top 30%)
#                           pressure=20  →  best of 20 (winner ≈ top 5%)
#
#   scheme: rank            Sort the whole population by fitness, then assign
#                           selection probability by rank (not by raw score).
#                           pressure = η_max in [1.0, 2.0]; at 2.0 the best
#                           robot gets 2× the average selection chance, worst
#                           gets 0. Scale-independent like tournament but capped.
#
# HOW REPLACEMENT WORKS  (independent of scheme — always applies)
# After the child is evaluated it overwrites one slot in the population.
#
#   replacement: uniform_random   Pick any slot at random, including the
#                                 current best — good robots can be evicted.
#
#   replacement: worst            Always overwrite the weakest robot. The
#                                 minimum fitness can only go up over time.
#
# MAX REROLLS
# When a mutation produces a robot with degenerate geometry (e.g. zero-length
# bars) the evolver retries the mutation. max_rerolls is the retry limit.
# After that many failures it gives up and uses the parent unchanged.
#
selection:
  scheme:      proportionate 
  pressure:    1.0          # best of 20 random competitors
  replacement: uniform        # always evict the weakest individual
  max_rerolls: 1000


mutation:
  p_add_bar_new:      0.005  # Strategy A: dangle new vertex+bar off existing vertex
  p_remove_bar:       0.005  # remove a random bar (connectivity-guarded)
  p_add_bar_bridge:   0.010  # Strategy B: connect two existing unconnected vertices
  p_remove_bar_edge:  0.010  # reverse of Strategy A: remove a leaf bar + leaf vertex
  p_add_neuron:       0.010  # add a fully-connected neuron
  p_remove_neuron:    0.010  # remove a random neuron
  p_split_vertex:     0.03
  p_join_vertex:      0.03
  p_attach_neuron:    0.015   # attach a neuron to an unactuated bar
  p_detach_neuron:    0.015   # detach all actuators from an actuated bar
  p_rewire:           0.00
  p_perturb:          0.10
  num_method_retries: 1000     # per-method retry limit before whole mutation is cloned

  perturb_bar_frac:      0.10
  perturb_threshold_mag: 0.50
  perturb_weight_mag:    0.50

  bar_length_min: 0.04 #0.02
  bar_length_max: 0.25 #0.10

  threshold_min:  0.00
  threshold_max:  2.00

  perturb_bar_grow_only_below: 0.04  # bars shorter than this only grow when perturbed
  split_bar_min_length:         0.08  # bars shorter than this are never bisected
  split_vertex_offset: 0.04
  actuator_range_max:  0.04

  new_synapse_weight_min: -1.00
  new_synapse_weight_max:  1.00

  new_bar_stiffness_min: 5    # stiffness range for bars created by mutations [N/m]
  new_bar_stiffness_max: 5
  new_vertex_min_z: 0.01       # minimum Z [m] for any new vertex; acts as a floor clamp (default = 1 cm above floor)

# ── Fitness — only used when evaluate_final: true ─────────────────────────────
# Use a shorter run than prod so the final eval completes quickly.

fitness:
  num_steps:       700000 
  # Steps (out of num_steps) to use as a settling window before fitness is
  # measured. Total physics run = num_steps; fitness measured over the last
  # (num_steps - delay_steps). 0 = disabled (default).
  delay_steps:     100000   # e.g. 6 settling ticks × spc=1000000
  steps_per_cycle: 50000  # physics steps per neural tick
  steps_per_frame: 5000 # before was same as per cycle # physics steps per video frame (= old video.steps_per_frame)
  step_size:       1.0e-2
  gravity:         9.81e4 #9.81        # gravitational acceleration [m/s²]
  wind:            0.0
  mu_static:       5.0e4 # 50        # kinetic friction coefficient
  k_floor:         10 #10    # floor spring stiffness [N/m]
  actuator_max_extension_per_cycle: 0.01   # max bar extension per neural tick [m]

  # ── Self-collision repulsion ──────────────────────────────────────────────
  # Both terms are disabled by default (k=0).  Set k > 0 to enable.
  # The penalty is H = k*(r0 - d)^2 for any pair closer than r0.
  #
  # Vertex-vertex: penalises non-connected vertex pairs that come too close.
  k_repulse_vertex:        10.0   # spring constant [N/m²].  0 = disabled.
  repulse_vertex_min_dist: 0.02  # minimum separation before penalty kicks in [m]
  #
  # Bar-bar + vertex-bar: penalises non-adjacent bar pairs whose closest-point
  #   distance falls below the threshold (catches crossing / near-crossing bars),
  #   AND any vertex that penetrates the interior of a non-incident bar
  #   (catches e.g. a triangle collapsing to a line).
  k_repulse_bar:           10.0   # spring constant [N/m²].  0 = disabled.
  repulse_bar_min_dist:    0.02  # minimum clearance [m]

  # Per-step position noise [m] injected during relaxation to escape unstable
  # equilibria (e.g. robot balanced on a vertex tip).  
  noise_amplitude: 2.5e-6

# ── Video — only used when evaluate_final: true ───────────────────────────────




video:
  enabled:         true
  fps:             10
  width:           1280
  height:          720 
  verbose:         false   # suppress raylib INFO and ffmpeg output
  min_fitness:     0.005 #0.01    # skip MP4 render if best fitness is below this [m]
  render_vertex_radius: 0.006  # visual sphere radius for vertices [m]
  render_bar_radius:    0.005  # visual cylinder radius for bars and actuators [m]
  actuator_housing_radius_scale: 1.0   # fat housing radius = render_bar_radius × this
  actuator_rod_radius_scale:     0.5  # thin piston rod radius = render_bar_radius × this  floor_contact_threshold: 0.006  # vertex highlight height [m]; red when centre ≤ this (match render_vertex_radius)
  floor_shadow_height:     0.05   # blob shadow for vertices below this height [m] (0 = disable)  camera_distance:  0.2   # camera distance from robot CoM [m]  (smaller = closer)
  camera_fov:       45.0  # perspective field of view [degrees]  (smaller = tighter zoom)
  camera_elevation: 0.8   # vertical offset as fraction of lateral distance  (0=side, 1=above)
  camera_follow:    true  # true = track robot CoM each frame; false = fixed camera at origin
  camera_distance:  0.2   # camera distance from robot CoM [m]  (smaller = closer)
  floor_grid_spacing: 0.10  # ground grid line spacing [m]  (0.01 = 1 cm)
