# deform_robot.yaml
# Tetrahedron truss with rest lengths computed exactly from vertex positions,
# so H_elastic = 0 at step 0.  Used by deformation_series to sanity-check §3.1.
#
# Vertices:
#   0: (0.00, 0.00, 0.00)   base front-left
#   1: (0.20, 0.00, 0.00)   base front-right
#   2: (0.10, 0.20, 0.00)   base back-centre
#   3: (0.10, 0.10, 0.20)   apex
#
# Bar rest lengths (exact Euclidean distances):
#   v0-v1 : 0.20000  sqrt(0.04)
#   v0-v2 : 0.22361  sqrt(0.05)
#   v1-v2 : 0.22361  sqrt(0.05)
#   v0-v3 : 0.24495  sqrt(0.06)
#   v1-v3 : 0.24495  sqrt(0.06)
#   v2-v3 : 0.22361  sqrt(0.05)

id: 42
vertices:
  - [0.00, 0.00, 0.00]   # 0 – base front-left
  - [0.20, 0.00, 0.00]   # 1 – base front-right
  - [0.10, 0.20, 0.00]   # 2 – base back-centre
  - [0.10, 0.10, 0.20]   # 3 – apex

bars:
  - {v1: 0, v2: 1, rest_length: 0.20000, radius: 0.010}   # 0 – base front
  - {v1: 0, v2: 2, rest_length: 0.22361, radius: 0.010}   # 1 – base left
  - {v1: 1, v2: 2, rest_length: 0.22361, radius: 0.010}   # 2 – base right
  - {v1: 0, v2: 3, rest_length: 0.24495, radius: 0.008}   # 3 – strut left
  - {v1: 1, v2: 3, rest_length: 0.24495, radius: 0.008}   # 4 – strut right
  - {v1: 2, v2: 3, rest_length: 0.22361, radius: 0.008}   # 5 – strut back

neurons: []
actuators: []
