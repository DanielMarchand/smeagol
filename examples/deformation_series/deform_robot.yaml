# deform_robot.yaml
# Tetrahedron truss; rest lengths are computed automatically from the
# initial vertex positions at load time (Eigen norm), so H_elastic = 0
# at step 0.  Used by deformation_series to sanity-check §3.1.
#
# Vertices:
#   0: (0.00, 0.00, 0.00)   base front-left
#   1: (0.20, 0.00, 0.00)   base front-right
#   2: (0.10, 0.20, 0.00)   base back-centre
#   3: (0.10, 0.10, 0.20)   apex

id: 42
vertices:
  - [0.00, 0.00, 0.00]   # 0 – base front-left
  - [0.20, 0.00, 0.00]   # 1 – base front-right
  - [0.10, 0.20, 0.00]   # 2 – base back-centre
  - [0.10, 0.10, 0.20]   # 3 – apex

bars:
  - {v1: 0, v2: 1, stiffness: 50000}   # 0 – base front
  - {v1: 0, v2: 2, stiffness: 50000}   # 1 – base left
  - {v1: 1, v2: 2, stiffness: 50000}   # 2 – base right
  - {v1: 0, v2: 3, stiffness: 50000}   # 3 – strut left
  - {v1: 1, v2: 3, stiffness: 50000}   # 4 – strut right
  - {v1: 2, v2: 3, stiffness: 50000}   # 5 – strut back

neurons: []
actuators: []
