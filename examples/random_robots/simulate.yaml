# simulate.yaml – FitnessEvaluator parameters for random_robots
#
# Used by evaluate_fitness to simulate and record each generated robot.
# run.sh derives a per-robot output path from the 'output' field below.
#
# Total simulation time = num_frames * steps_per_frame * step_size  seconds
# Neural tick period    = steps_per_cycle * step_size  seconds

steps_per_cycle: 3000000  #25000   # 12 cycles for the entire simulation (60*5000/25000 = 12) 

#fps:             10
#num_frames:      60
#steps_per_frame: 50 # 5000
#step_size:       1.0e-6

fps:             30
num_frames:      100 # 200
steps_per_frame: 2000000 # 10000
step_size:       1.0e-7 #1e-7

# Video output (base path — run.sh appends robot name)
width:  640
height: 480
output: /tmp/random_robot.mp4

# No artificial wind — let the neural controller drive locomotion
wind: 0.0
