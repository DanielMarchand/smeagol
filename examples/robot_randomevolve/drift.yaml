# drift.yaml — drift_robot configuration
#
# Usage (from repo root):
#   build/drift_robot examples/drift_robot/drift.yaml
#
# Purpose:
#   Runs N mutation steps on a single robot WITHOUT any fitness evaluation.
#   Cheap (seconds per run) — use this to sanity-check mutation parameters
#   before launching a slow full evolution run.
#
# Output lands in:  examples/drift_robot/output/
#   step_<N>.yaml     intermediate snapshots (every snapshot_every steps)
#   robot_final.yaml  the robot at the end of the walk
#   final.mp4         fitness simulation of the final robot (if evaluate_final)

# ── Walk settings ─────────────────────────────────────────────────────────────

steps:          0 #50     # number of mutation steps (no fitness eval each step)
seed:           41      # RNG seed
snapshot_every: 50      # save robot YAML every N steps (0 = no snapshots)
evaluate_final: true    # run fitness eval + record video on the final robot
max_rerolls:    100     # retries when a mutation produces an invalid robot
output_dir:     output  # relative to this file's directory

# ── Starting robot ─────────────────────────────────────────────────────────────
#
# Option A: generate a fresh random robot  →  fill in the `robot:` block below.
# Option B: load an existing robot YAML    →  uncomment `start_yaml` instead.
#
#start_yaml: './robot_0.yaml'
start_yaml: '../tetrahedron_pendulum/robot.yaml'  # use the pendulum's starting robot as a sanity check for mutation parameters


