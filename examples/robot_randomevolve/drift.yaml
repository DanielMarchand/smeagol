# ── Mutation — mirrors prod/config.yaml exactly ───────────────────────────────

mutation:
  p_perturb:    0.10
  p_add_remove: 0.01
  p_split:      0.03
  p_attach:     0.03
  p_rewire:     0.00

  perturb_bar_frac:      0.10
  perturb_threshold_mag: 0.50
  perturb_weight_mag:    0.50

  bar_length_min: 0.03 #0.02
  bar_length_max: 0.3 #0.10
  threshold_min:  0.00
  threshold_max:  2.00

  perturb_bar_grow_only_below: 0.03  # bars shorter than this only grow when perturbed
  split_bar_min_length:         0.04  # bars shorter than this are never bisected
  split_vertex_offset: 0.03
  actuator_range_max:  0.04

  new_synapse_weight_min: -1.00
  new_synapse_weight_max:  1.00

  new_bar_stiffness_min: 500 #10000    # stiffness range for bars created by mutations [N/m]
  new_bar_stiffness_max: 500 #10000

# ── Fitness — only used when evaluate_final: true ─────────────────────────────
# Use a shorter run than prod so the final eval completes quickly.

fitness:
  num_steps:       120000000  # 120 neural ticks × spc=1000000
  steps_per_cycle: 1000000  # physics steps per neural tick
  steps_per_frame: 1000000  # physics steps per video frame (1 frame per tick)
  step_size:       1.0e-4
  gravity:         9.81 #9.81       # gravitational acceleration [m/s²]
  wind:            0.0
  mu_static:       0.5        # kinetic friction coefficient
  k_floor:         1000    # floor spring stiffness [N/m]
  actuator_max_extension_per_cycle: 0.01   # max bar extension per neural tick [m]
  actuator_max_extension_total:     0.04   # max total bar extension from base [m]
  bar_stiffness_override: 500              # override all bar stiffnesses [N/m] — matches simulation.yaml

# ── Video — only used when evaluate_final: true ───────────────────────────────

video:
  enabled:         true
  fps:             30
  verbose:         true   # suppress raylib INFO and ffmpeg output

