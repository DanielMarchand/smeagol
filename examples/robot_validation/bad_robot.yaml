  - [0.0, 0.0, 0.1]   # 3

bars:
  - {v1: 0, v2: 1,  stiffness: 50000}   # 0 – valid
  - {v1: 0, v2: 99, stiffness: 50000}   # 1 – ERROR: vertex 99 missing
  - {v1: 1, v2: 2,  stiffness: 50000}   # 2 – valid

neurons:
  - {threshold: 0.5, weights: [0.0, 0.1, 0.2]}  # 0 – ERROR: 3 weights but only 2 neurons
  - {threshold: 0.3, weights: [0.0, 0.0]}        # 1 – valid size, but neuron[0] still wrong

actuators:
  - {bar_idx: 5, neuron_idx: 0, bar_range: 0.010}  # ERROR: bar 5 does not exist
  - {bar_idx: 0, neuron_idx: 3, bar_range: 0.010}  # ERROR: neuron 3 does not exist
